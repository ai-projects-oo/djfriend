<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DJFriend — Smart DJ Set Generator</title>

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  transition: all 0.2s ease;
}

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --purple: #7c3aed;
  --purple-lt: #a78bfa;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --dim: #475569;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.75);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(124, 58, 237, 0.08);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-weight: 700;
  text-decoration: none;
  color: var(--text);
}

.nav-links {
  display: flex;
  gap: 1.5rem;
  list-style: none;
}

.nav-links a {
  color: var(--dim);
  text-decoration: none;
  font-size: 0.875rem;
}

.nav-links a:hover {
  color: var(--text);
}

/* LAYOUT */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1.75rem;
}

/* HERO */
.hero {
  padding: 8rem 0 6rem;
  text-align: center;
}

.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin-bottom: 1.25rem;
  text-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
}

.hero h1 span { color: var(--purple-lt); }

.hero-bullets {
  list-style: none;
  margin-top: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  align-items: center;
  color: var(--muted);
}

.hero-bullets li::before {
  content: '·';
  color: var(--purple-lt);
  margin-right: 6px;
}

/* DIVIDER */
hr {
  border: none;
  height: 1px;
  background: linear-gradient(
    to right,
    transparent,
    rgba(124, 58, 237, 0.2),
    transparent
  );
}

/* SECTIONS */
section { padding: 5rem 0; }

h2 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.section-intro {
  color: var(--muted);
  margin-bottom: 2rem;
}

/* FEATURES */
.feat-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0.6rem 2rem;
}

.feat-list li {
  list-style: none;
  color: var(--muted);
  line-height: 1.6;
}

.feat-list li::before {
  content: "–";
  color: var(--purple-lt);
  margin-right: 6px;
}

/* CARDS */
.dl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1rem;
}

.dl-card {
  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.01)
  );
  border: 1px solid rgba(124, 58, 237, 0.08);
  border-radius: 16px;
  padding: 1.9rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.dl-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.55);
  border-color: rgba(124, 58, 237, 0.25);
}

/* BUTTONS */
.btn-primary {
  background: var(--purple);
  color: #fff;
  padding: 0.8rem;
  border-radius: 9px;
  text-align: center;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 6px 18px rgba(124, 58, 237, 0.35);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 25px rgba(124, 58, 237, 0.5);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.03);
}

/* STEPS */
.step {
  display: flex;
  gap: 1rem;
  padding: 0.5rem 0;
}

.step-num {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(124, 58, 237, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--purple-lt);
  box-shadow: 0 0 12px rgba(124, 58, 237, 0.25);
}

/* SOURCE */
.source-card:hover {
  border-color: var(--purple);
}

/* CALLOUT */
.callout {
  background: rgba(124, 58, 237, 0.05);
  border-left: 3px solid var(--purple);
  padding: 1rem;
  border-radius: 6px;
}

/* FOOTER */
footer {
  background: rgba(255,255,255,0.01);
  border-top: 1px solid var(--border);
  padding: 2rem;
  text-align: center;
  color: var(--dim);
}

/* MOBILE */
@media (max-width: 600px) {
  .nav-links { display: none; }
}
</style>
</head>

<body>

<nav>
  <a class="nav-logo" href="#">
    <img src="icon.png" style="width:22px;height:22px;border-radius:5px">
    DJFriend
  </a>
  <ul class="nav-links">
    <li><a href="#install">Download</a></li>
    <li><a href="#load">Load</a></li>
    <li><a href="#generate">Generate</a></li>
  </ul>
</nav>

<div class="container">
  <div class="hero">
    <h1>Build smarter<br><span>DJ sets</span></h1>
    <ul class="hero-bullets">
      <li>Harmonic mixing</li>
      <li>Energy curves</li>
      <li>AI track selection</li>
    </ul>
  </div>
</div>

<hr>

<section>
  <div class="container">
    <h2>Download</h2>
    <div class="dl-grid">
      <div class="dl-card">
        <h3>Windows</h3>
        <a class="btn-primary">Download</a>
      </div>
      <div class="dl-card">
        <h3>macOS</h3>
        <a class="btn-primary">Download</a>
      </div>
    </div>
  </div>
</section>

<footer>
  DJFriend · 2026
</footer>

</body>
</html>
