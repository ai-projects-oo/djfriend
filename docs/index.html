<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DJFriend — Smart DJ Set Generator</title>

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  transition: all 0.2s ease;
}

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --purple: #7c3aed;
  --purple-lt: #a78bfa;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --dim: #475569;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.7;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.75);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(124, 58, 237, 0.08);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 1.5rem;
  list-style: none;
}

.nav-links a {
  color: var(--dim);
  text-decoration: none;
  font-size: 0.875rem;
}

.nav-links a:hover { color: var(--text); }

/* LAYOUT */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1.75rem;
}

/* HERO */
.hero {
  padding: 8rem 0 6rem;
  text-align: center;
}

.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  margin-bottom: 1.25rem;
  text-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
}

.hero h1 span { color: var(--purple-lt); }

.hero-bullets {
  list-style: none;
  margin-top: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  align-items: center;
  color: var(--muted);
}

.hero-bullets li::before {
  content: "·";
  color: var(--purple-lt);
  margin-right: 6px;
}

/* HERO CTA */
.hero-cta {
  margin-top: 2rem;
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* BUTTONS */
.btn-primary {
  background: var(--purple);
  color: #fff;
  padding: 0.8rem 1.5rem;
  border-radius: 9px;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 6px 18px rgba(124, 58, 237, 0.35);
}

.btn-primary:hover {
  box-shadow: 0 0 30px rgba(124, 58, 237, 0.6);
  transform: translateY(-1px);
}

.btn-primary:active { transform: scale(0.96); }

.btn-secondary {
  border: 1px solid var(--border);
  padding: 0.8rem 1.5rem;
  border-radius: 9px;
  text-decoration: none;
  color: var(--muted);
}

.btn-secondary:hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

/* DIVIDER */
hr {
  border: none;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(124,58,237,0.2), transparent);
}

/* SECTIONS */
section {
  padding: 5rem 0;
  position: relative;
}

section::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 10%;
  width: 80%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(124,58,237,0.15), transparent);
}

/* CARDS */
.dl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1rem;
}

.dl-card {
  background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border: 1px solid rgba(124, 58, 237, 0.08);
  border-radius: 16px;
  padding: 1.9rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.dl-card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 20px 50px rgba(0,0,0,0.55);
}

/* FADE ANIMATION */
.fade-in {
  opacity: 0;
  transform: translateY(25px);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 2rem;
  color: var(--dim);
}

/* MOBILE */
@media (max-width: 600px) {
  .nav-links { display: none; }
}
</style>
</head>

<body>

<nav>
  <a class="nav-logo" href="#">
    <img src="icon.png" style="width:22px;height:22px;border-radius:5px">
    DJFriend
  </a>
  <ul class="nav-links">
    <li><a href="#install">Download</a></li>
    <li><a href="#load">Load</a></li>
    <li><a href="#generate">Generate</a></li>
    <li><a href="#export">Export</a></li>
  </ul>
</nav>

<div class="container">
  <div class="hero">
    <h1>Build smarter<br><span>DJ sets</span></h1>
    <ul class="hero-bullets">
      <li>Harmonic mixing</li>
      <li>Energy curves</li>
      <li>AI-powered selection</li>
    </ul>

    <div class="hero-cta">
      <a href="#install" class="btn-primary">Download DJFriend</a>
      <a href="https://djfriend.onrender.com" class="btn-secondary">Try Web App</a>
    </div>
  </div>
</div>

<hr>

<section id="install">
  <div class="container">
    <h2>Download</h2>
    <div class="dl-grid">
      <div class="dl-card">
        <h3>Windows</h3>
        <a href="#" class="btn-primary">Download</a>
      </div>
      <div class="dl-card">
        <h3>macOS</h3>
        <a href="#" class="btn-primary">Download</a>
      </div>
    </div>
  </div>
</section>

<footer>
  DJFriend · 2026
</footer>

<script>
const elements = document.querySelectorAll("section, .dl-card");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = 1;
      entry.target.style.transform = "translateY(0)";
    }
  });
}, { threshold: 0.1 });

elements.forEach(el => {
  el.classList.add("fade-in");
  observer.observe(el);
});
</script>

</body>
</html>
